app = "ai-agents-saas"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  API_VERSION = "1.0.0"

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A app.workers.celery_worker worker --loglevel=info --concurrency=2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
